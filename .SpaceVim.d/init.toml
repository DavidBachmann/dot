[options]
colorscheme = "gruvbox"
colorscheme_bg = "dark"
buffer_index_type = 4
filetree_direction = "left"
wildignore = '*/modules/*,*.so'
bootstrap_before = "myspacevim#before"
bootstrap_after = "myspacevim#after"

# options for statusline
# Set the statusline separators of statusline, default is "arrow"
statusline_separator = "arrow"
# Set the statusline separators of inactive statusline
statusline_iseparator = "bar"

enable_tabline_filetype_icon = true

# Enable/Disable show mode on statusline
enable_statusline_mode = true

# left sections of statusline
statusline_left_sections = [
   'major mode',
   'filename',
   'fileformat',
   'version control info',
]
# right sections of statusline
statusline_right_sections = [
   'cursorpos',
   'percentage',
   'input method',
   'date',
   'time'
]

# Statusline items
# 'winnr' window number
# 'syntax checking'
# 'filename' file name
# 'fileformat' file format
# 'major mode'
# 'minor mode lighters'
# 'cursorpos' cursor position
# 'percentage' content range
# 'date' date
# 'time' time
# 'whitespace' line number with trailing space at the end
# 'battery status' battery status
# 'input method' input method
# 'search status' search index

# NOTE: the value should be a list, and each item is the name of the plugin.
# disabled_plugins = [""]

# Enable autocomplete layer
[[layers]]
name = "autocomplete"
auto_completion_return_key_behavior = "complete"
auto_completion_tab_key_behavior = "smart"

[[layers]]
name = "git"

[[layers]]
name = "VersionControl"

[[layers]]
name = "colorscheme"

[[layers]]
name = "core#statusline"

[[layers]]
name = "format"
format_on_save = true

[[layers]]
name = "fzf"

[[layers]]
name = "lang#toml"

[[layers]]
name = "lang#javascript"

[[layers]]
name = "lang#typescript"

[[custom_plugins]]
name = "vim-syntastic/syntastic"
merged = false

[[custom_plugins]]
name = "ryanoasis/vim-devicons"
merged = false

[[custom_plugins]]
name = "nvim-lua/plenary.nvim"
merged = false

# BurntSushi/ripgrep is required for Telescope's live_grep and grep_string features and for Ferret
[[custom_plugins]]
name = "BurntSushi/ripgrep"
merged = false

[[custom_plugins]]
name = "wincent/ferret"
merged = false

[[custom_plugins]]
name = "justinmk/vim-sneak"
merged = false

[[custom_plugins]]
name = "bkad/CamelCaseMotion"
merged = false

[[custom_plugins]]
name = "alvan/vim-closetag"
merged = false

[[custom_plugins]]
name = "unkiwii/vim-nerdtree-sync"
merged = false

[[custom_plugins]]
name = "luochen1990/rainbow"
merged = false

[[custom_plugins]]
name = "leafgarland/typescript-vim"
merged = false

[[custom_plugins]]
name = "maxmellon/vim-jsx-pretty"
merged = false
